server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false   # we're defining routes manually, not auto-discovering
          routes:
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: payment-service-route
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: refund-service-route
              uri: lb://payment-service
              predicates:
                  - Path=/api/refunds/**

            - id: notification-service-route
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:}